<!-- templates/options_iv.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Implied Volatility Finder</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <div class="page">
    <a class="back-btn" href="/options-derivatives">← Options & Derivatives</a>
    <h1>Implied Volatility Finder</h1>
    <p class="subtitle">Recover σ from a market option price using bisection on Black–Scholes.</p>

    <form id="iv-form" class="form-grid">
      <div class="form-row">
        <label>Type</label>
        <select id="otype">
          <option value="call">Call</option>
          <option value="put">Put</option>
        </select>
      </div>

      <div class="form-row">
        <label>Underlying (S₀)</label>
        <input id="S" type="number" step="0.01" value="100">
      </div>

      <div class="form-row">
        <label>Strike (K)</label>
        <input id="K" type="number" step="0.01" value="100">
      </div>

      <div class="form-row">
        <label>Time (T, years)</label>
        <input id="T" type="number" step="0.01" value="0.5">
      </div>

      <div class="form-row">
        <label>Risk-free (r, %)</label>
        <input id="r" type="number" step="0.01" value="5">
      </div>

      <div class="form-row">
        <label>Dividend (q, %)</label>
        <input id="q" type="number" step="0.01" value="0">
      </div>

      <div class="form-row">
        <label>Market Option Price</label>
        <input id="P" type="number" step="0.01" value="7">
      </div>

      <div class="form-row full">
        <button type="button" class="btn" onclick="solveIV()">Solve IV</button>
      </div>
    </form>

    <div class="results" id="results" style="display:none">
      <div class="kv"><span>Implied Volatility (σ, %)</span><strong id="iv"></strong></div>
      <div class="kv small"><span>Note:</span> If no solution is found in 0.01%–500% vol, you’ll see “No solution”.</div>
    </div>
  </div>

  <script>
    function normPdf(x){ return Math.exp(-0.5*x*x)/Math.sqrt(2*Math.PI); }
    function normCdf(x){
      var k = 1 / (1 + 0.2316419 * Math.abs(x));
      var a1 = 0.319381530, a2 = -0.356563782, a3 = 1.781477937,
          a4 = -1.821255978, a5 = 1.330274429;
      var m = 1 - normPdf(x) * (a1*k + a2*k*k + a3*Math.pow(k,3) + a4*Math.pow(k,4) + a5*Math.pow(k,5));
      return x >= 0 ? m : 1 - m;
    }
    function bsPrice(S,K,T,sigma,r,q,otype){
      const sqrtT = Math.sqrt(T);
      const d1 = (Math.log(S/K) + (r - q + 0.5*sigma*sigma)*T) / (sigma*sqrtT);
      const d2 = d1 - sigma*sqrtT;
      const disc_r = Math.exp(-r*T), disc_q = Math.exp(-q*T);
      if(otype==='call') return S*disc_q*normCdf(d1) - K*disc_r*normCdf(d2);
      return K*disc_r*normCdf(-d2) - S*disc_q*normCdf(-d1);
    }
    function round(x){ return Math.round(x * 10000) / 10000; }

    function solveIV(){
      const otype = document.getElementById('otype').value;
      const S = parseFloat(document.getElementById('S').value);
      const K = parseFloat(document.getElementById('K').value);
      const T = Math.max(1e-8, parseFloat(document.getElementById('T').value));
      const r = parseFloat(document.getElementById('r').value)/100;
      const q = parseFloat(document.getElementById('q').value)/100;
      const P = parseFloat(document.getElementById('P').value);

      // Bisection between 0.0001% and 500%
      let lo = 1e-6, hi = 5.0, mid, fmid;
      const target = P;
      let f_lo = bsPrice(S,K,T,lo,r,q,otype) - target;
      let f_hi = bsPrice(S,K,T,hi,r,q,otype) - target;
      if(f_lo*f_hi > 0){
        document.getElementById('iv').innerText = 'No solution in 0.01%–500%';
        document.getElementById('results').style.display = 'block';
        return;
      }
      for(let i=0;i<100;i++){
        mid = 0.5*(lo+hi);
        fmid = bsPrice(S,K,T,mid,r,q,otype) - target;
        if(Math.abs(fmid) < 1e-6) break;
        if(f_lo * fmid <= 0){ hi = mid; }
        else { lo = mid; }
      }
      document.getElementById('iv').innerText = round(mid*100);
      document.getElementById('results').style.display = 'block';
    }
  </script>
</body>
</html>
