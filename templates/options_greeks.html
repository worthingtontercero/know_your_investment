<!-- templates/options_greeks.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Greeks Explorer</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <div class="page">
    <a class="back-btn" href="/options-derivatives">← Options & Derivatives</a>
    <h1>Greeks Explorer</h1>
    <p class="subtitle">See how Greeks change as the underlying moves.</p>

    <form id="greeks-form" class="form-grid">
      <div class="form-row">
        <label>Type</label>
        <select id="otype">
          <option value="call">Call</option>
          <option value="put">Put</option>
        </select>
      </div>
      <div class="form-row"><label>Underlying (S₀)</label>
        <input id="S" type="number" step="0.01" value="100">
      </div>
      <div class="form-row"><label>Strike (K)</label>
        <input id="K" type="number" step="0.01" value="100">
      </div>
      <div class="form-row"><label>Time (T, years)</label>
        <input id="T" type="number" step="0.01" value="0.5">
      </div>
      <div class="form-row"><label>Vol (σ, %)</label>
        <input id="sigma" type="number" step="0.01" value="20">
      </div>
      <div class="form-row"><label>r (%)</label>
        <input id="r" type="number" step="0.01" value="5">
      </div>
      <div class="form-row"><label>q (%)</label>
        <input id="q" type="number" step="0.01" value="0">
      </div>
      <div class="form-row">
        <label>Range ×S₀</label>
        <input id="range" type="number" step="0.1" value="0.5">
        <small class="hint">Plots from (1−range)×S₀ to (1+range)×S₀</small>
      </div>
      <div class="form-row full">
        <button type="button" class="btn" onclick="plotGreeks()">Plot</button>
      </div>
    </form>

    <div class="chart-container">
      <canvas id="greeksChart"></canvas>
    </div>
  </div>

  <script>
    // PDF and CDF for standard normal (Abramowitz–Stegun approximation)
    function normPdf(x){ return Math.exp(-0.5*x*x)/Math.sqrt(2*Math.PI); }
    function normCdf(x){
      var k = 1 / (1 + 0.2316419 * Math.abs(x));
      var a1 = 0.319381530, a2 = -0.356563782, a3 = 1.781477937,
          a4 = -1.821255978, a5 = 1.330274429;
      var m = 1 - normPdf(x) * (a1*k + a2*k*k + a3*Math.pow(k,3) + a4*Math.pow(k,4) + a5*Math.pow(k,5));
      return x >= 0 ? m : 1 - m;
    }

    // Greeks for European options with continuous dividend yield q
    function greeks(S,K,T,sigma,r,q,otype){
      const sqrtT = Math.sqrt(T);
      const d1 = (Math.log(S/K) + (r - q + 0.5*sigma*sigma)*T) / (sigma*sqrtT);
      const d2 = d1 - sigma*sqrtT;
      const disc_r = Math.exp(-r*T);
      const disc_q = Math.exp(-q*T);
      const n_d1 = normPdf(d1);

      let delta, theta, rho;
      if(otype === 'call'){
        // Theta here is per year; we divide by 365 when plotting
        delta = disc_q * normCdf(d1);
        theta = (-S*disc_q*n_d1*sigma/(2*sqrtT) - r*K*disc_r*normCdf(d2) + q*S*disc_q*normCdf(d1));
        rho   =  K*T*disc_r*normCdf(d2);
      }else{
        delta = disc_q * (normCdf(d1) - 1);
        theta = (-S*disc_q*n_d1*sigma/(2*sqrtT) + r*K*disc_r*normCdf(-d2) - q*S*disc_q*normCdf(-d1));
        rho   = -K*T*disc_r*normCdf(-d2);
      }

      const gamma = (disc_q * n_d1) / (S * sigma * sqrtT);
      const vega  = S * disc_q * n_d1 * sqrtT; // (per 1.0 = 100% vol)
      return { delta, gamma, vega, theta, rho };
    }

    let chart;
    function plotGreeks(){
      const otype = document.getElementById('otype').value;
      const S0 = parseFloat(document.getElementById('S').value);
      const K = parseFloat(document.getElementById('K').value);
      const T = Math.max(1e-8, parseFloat(document.getElementById('T').value));
      const sigma = Math.max(1e-8, parseFloat(document.getElementById('sigma').value)/100);
      const r = parseFloat(document.getElementById('r').value)/100;
      const q = parseFloat(document.getElementById('q').value)/100;
      const range = Math.max(0.05, parseFloat(document.getElementById('range').value));

      const Smin = (1 - range)*S0, Smax = (1 + range)*S0, N = 201;
      const xs = [], d=[], g=[], v=[], t=[], rh=[];
      for(let i=0;i<N;i++){
        const S = Smin + (Smax - Smin)*i/(N-1);
        const gr = greeks(S,K,T,sigma,r,q,otype);
        xs.push(Math.round(S*100)/100);
        d.push(gr.delta);
        g.push(gr.gamma);
        v.push(gr.vega);
        t.push(gr.theta/365.0);  // convert to per day for the chart label
        rh.push(gr.rho/100.0);   // convert to per 1% for the chart label
      }

      const ctx = document.getElementById('greeksChart').getContext('2d');
      if(chart) chart.destroy();
      chart = new Chart(ctx, {
        type: 'line',
        data: {
          labels: xs,
          datasets: [
            { label: 'Delta', data: d, borderWidth: 2, fill:false },
            { label: 'Gamma', data: g, borderWidth: 2, fill:false },
            { label: 'Vega',  data: v, borderWidth: 2, fill:false },
            { label: 'Theta (per day)', data: t, borderWidth: 2, fill:false },
            { label: 'Rho (per 1%)',    data: rh, borderWidth: 2, fill:false }
          ]
        },
        options: {
          responsive: true,
          plugins: { legend: { display: true } },
          scales: {
            x: { title: { display: true, text: 'Underlying Price (S)' } },
            y: { title: { display: true, text: 'Greek value' } }
          }
        }
      });
    }

    // Auto-plot on load with defaults
    plotGreeks();
  </script>
</body>
</html>
