<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Option Pricing — Black–Scholes</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <div class="page">
    <a class="back-btn" href="/options-derivatives">← Options & Derivatives</a>
    <h1>Option Pricing (Black–Scholes)</h1>
    <p class="subtitle">European options with continuous dividend yield.</p>

    <form id="bs-form" class="form-grid">
      <div class="form-row">
        <label>Underlying Price (S₀)</label>
        <input type="number" id="S" step="0.01" value="100">
      </div>
      <div class="form-row">
        <label>Strike (K)</label>
        <input type="number" id="K" step="0.01" value="100">
      </div>
      <div class="form-row">
        <label>Time to Expiry (T, years)</label>
        <input type="number" id="T" step="0.01" value="1">
      </div>
      <div class="form-row">
        <label>Volatility (σ, %)</label>
        <input type="number" id="sigma" step="0.01" value="20">
      </div>
      <div class="form-row">
        <label>Risk-free Rate (r, %)</label>
        <input type="number" id="r" step="0.01" value="5">
      </div>
      <div class="form-row">
        <label>Dividend Yield (q, %)</label>
        <input type="number" id="q" step="0.01" value="0">
      </div>
      <div class="form-row">
        <label>Type</label>
        <select id="otype">
          <option value="call">Call</option>
          <option value="put">Put</option>
        </select>
      </div>
      <div class="form-row full">
        <button type="button" class="btn" onclick="computeBS()">Compute</button>
      </div>
    </form>

    <div class="results two-col" id="results" style="display:none">
      <div>
        <h3>Price</h3>
        <div class="kv"><span>Option Price</span><strong id="price"></strong></div>
        <div class="kv"><span>d₁</span><strong id="d1"></strong></div>
        <div class="kv"><span>d₂</span><strong id="d2"></strong></div>
      </div>
      <div>
        <h3>Greeks</h3>
        <div class="kv"><span>Delta</span><strong id="delta"></strong></div>
        <div class="kv"><span>Gamma</span><strong id="gamma"></strong></div>
        <div class="kv"><span>Vega (per 1%)</span><strong id="vega"></strong></div>
        <div class="kv"><span>Theta (per day)</span><strong id="theta"></strong></div>
        <div class="kv"><span>Rho (per 1%)</span><strong id="rho"></strong></div>
      </div>
    </div>
  </div>

  <script>
    function normPdf(x){ return Math.exp(-0.5*x*x)/Math.sqrt(2*Math.PI); }
    function normCdf(x){
      var k = 1 / (1 + 0.2316419 * Math.abs(x));
      var a1 = 0.319381530, a2 = -0.356563782, a3 = 1.781477937,
          a4 = -1.821255978, a5 = 1.330274429;
      var m = 1 - normPdf(x) * (a1*k + a2*k*k + a3*Math.pow(k,3) + a4*Math.pow(k,4) + a5*Math.pow(k,5));
      return x >= 0 ? m : 1 - m;
    }
    function round(x){ return Math.round(x * 10000) / 10000; }

    function computeBS(){
      const S = parseFloat(document.getElementById('S').value);
      const K = parseFloat(document.getElementById('K').value);
      const T = Math.max(1e-8, parseFloat(document.getElementById('T').value));
      const sigma = Math.max(1e-8, parseFloat(document.getElementById('sigma').value) / 100);
      const r = parseFloat(document.getElementById('r').value) / 100;
      const q = parseFloat(document.getElementById('q').value) / 100;
      const otype = document.getElementById('otype').value;

      const sqrtT = Math.sqrt(T);
      const d1 = (Math.log(S/K) + (r - q + 0.5*sigma*sigma)*T) / (sigma*sqrtT);
      const d2 = d1 - sigma*sqrtT;

      const Nd1 = normCdf(d1), Nd2 = normCdf(d2);
      const n_d1 = normPdf(d1);
      const disc_r = Math.exp(-r*T);
      const disc_q = Math.exp(-q*T);

      let price, delta, theta, rho;
      if(otype === 'call'){
        price = S*disc_q*Nd1 - K*disc_r*Nd2;
        delta = disc_q*Nd1;
        theta = (-S*disc_q*n_d1*sigma/(2*sqrtT) - r*K*disc_r*Nd2 + q*S*disc_q*Nd1) / 365.0;
        rho   = (K*T*disc_r*Nd2) / 100.0; // per 1%
      }else{
        const Nmd1 = normCdf(-d1), Nmd2 = normCdf(-d2);
        price = K*disc_r*Nmd2 - S*disc_q*Nmd1;
        delta = disc_q*(Nd1 - 1);
        theta = (-S*disc_q*n_d1*sigma/(2*sqrtT) + r*K*disc_r*Nmd2 - q*S*disc_q*Nmd1) / 365.0;
        rho   = (-K*T*disc_r*Nmd2) / 100.0; // per 1%
      }

      const gamma = (disc_q*n_d1)/(S*sigma*sqrtT);
      const vega  = (S*disc_q*n_d1*sqrtT)/100.0; // per 1%

      document.getElementById('price').innerText = round(price);
      document.getElementById('d1').innerText = round(d1);
      document.getElementById('d2').innerText = round(d2);
      document.getElementById('delta').innerText = round(delta);
      document.getElementById('gamma').innerText = round(gamma);
      document.getElementById('vega').innerText  = round(vega);
      document.getElementById('theta').innerText = round(theta);
      document.getElementById('rho').innerText   = round(rho);

      document.getElementById('results').style.display = 'grid';
    }
  </script>
</body>
</html>
